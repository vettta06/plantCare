<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="./img/favicon/favicon.ico" sizes="any" />
    <link rel="icon" href="./img/favicon/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./img/favicon/apple-touch-icon.png" />
    <title>PlantCare</title>
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/stats.css" />
  </head>
  <body>
    <header class="header">
      <div class="header__container container">
        <a href="index.html" class="logo">PlantCare</a>
        <nav class="nav">
          <a href="index.html" class="nav__link" data-i18n="home">Home</a>
          <a href="stats.html" class="nav__link" data-i18n="stats"
            >Statistics</a
          >
          <!-- <a href="about.html" class="nav__link" data-i18n="about">About</a> -->
        </nav>
        <div class="burger">☰</div>
      </div>
    </header>
    <div class="mobile-menu" id="mobileMenu">
      <button class="mobile-menu__close">✕</button>
      <a href="index.html" class="nav__link" data-i18n="home">Home</a>
      <a href="stats.html" class="nav__link" data-i18n="stats">Statistics</a>
      <!-- <a href="about.html" class="nav__link" data-i18n="about">About</a> -->
    </div>
    <div class="mobile-menu__overlay"></div>
    <main class="main">
      <div class="container">
        <h1 class="stats__title" data-i18n="statsTitle">
          Overview of your collection
        </h1>
        <div class="stats-cards">
          <div class="stat-card stat-card--total">
            <p class="stat-card__label" data-i18n="total">total</p>
            <div class="stat-card__value">
              <span id="totalPlants">0</span>
              <img src="img/tree.svg" alt="tree" class="stat-card__icon" />
            </div>
          </div>
          <div class="stat-card stat-card--watering">
            <p class="stat-card__label" data-i18n="needWater">need watering</p>
            <div class="stat-card__value">
              <span id="needWater">0</span>
              <img src="img/drop.svg" alt="drop" class="stat-card__icon" />
            </div>
          </div>
          <div class="stat-card stat-card--healthy">
            <p class="stat-card__label" data-i18n="healthy">healthy</p>
            <div class="stat-card__value">
              <span id="healthyPlants">0</span>
              <img src="img/node.svg" alt="leaf" class="stat-card__icon" />
            </div>
          </div>
        </div>
        <div class="stats-charts">
          <div class="stats-chart">
            <h2 class="stats-chart__title" data-i18n="plantTypes">
              Plant types
            </h2>
            <div class="stats-chart__bars">
              <div class="chart-bar">
                <span class="chart-bar__label" data-i18n="leafy">Leafy</span>
                <div class="chart-bar__track">
                  <div
                    class="chart-bar__fill chart-bar__fill--leafy"
                    style="width: 0%"
                    data-value="0"
                  ></div>
                </div>
                <span class="chart-bar__value" id="leafyCount">0</span>
              </div>
              <div class="chart-bar">
                <span class="chart-bar__label" data-i18n="flowering">
                  Flowering
                </span>
                <div class="chart-bar__track">
                  <div
                    class="chart-bar__fill chart-bar__fill--flowering"
                    style="width: 0%"
                    data-value="0"
                  ></div>
                </div>
                <span class="chart-bar__value" id="floweringCount">0</span>
              </div>
              <div class="chart-bar">
                <span class="chart-bar__label" data-i18n="succulents">
                  Succulents
                </span>
                <div class="chart-bar__track">
                  <div
                    class="chart-bar__fill chart-bar__fill--succulent"
                    style="width: 0%"
                    data-value="0"
                  ></div>
                </div>
                <span class="chart-bar__value" id="succulentCount">0</span>
              </div>
            </div>
          </div>
          <div class="stats-chart">
            <h2 class="stats-chart__title" data-i18n="waterNeeds">
              Water needs
            </h2>
            <div class="stats-chart__bars">
              <div class="chart-bar">
                <span class="chart-bar__label" data-i18n="allGood">
                  All good
                </span>
                <div class="chart-bar__track">
                  <div
                    class="chart-bar__fill chart-bar__fill--good"
                    style="width: 0%"
                    data-value="0"
                  ></div>
                </div>
                <span class="chart-bar__value" id="allGoodCount">0</span>
              </div>
              <div class="chart-bar">
                <span class="chart-bar__label" data-i18n="attention">
                  Attention
                </span>
                <div class="chart-bar__track">
                  <div
                    class="chart-bar__fill chart-bar__fill--attention"
                    style="width: 0%"
                    data-value="0"
                  ></div>
                </div>
                <span class="chart-bar__value" id="attentionCount">0</span>
              </div>
              <div class="chart-bar">
                <span class="chart-bar__label" data-i18n="critical">
                  Critical
                </span>
                <div class="chart-bar__track">
                  <div
                    class="chart-bar__fill chart-bar__fill--critical"
                    style="width: 0%"
                    data-value="0"
                  ></div>
                </div>
                <span class="chart-bar__value" id="criticalCount">0</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <footer class="footer">
      <div class="container">
        <p class="footer__text" data-i18n="footer">
          PlantCare - with care for your plants
        </p>
        <p class="footer__year">2026</p>
      </div>
    </footer>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
