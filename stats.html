<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PlantCare - Статистика</title>
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/stats.css" />
  </head>
  <body>
    <header class="header">
      <div class="header__container container">
        <a href="index.html" class="logo">PlantCare</a>
        <nav class="nav">
          <a href="index.html" class="nav__link">Home</a>
          <a href="stats.html" class="nav__link nav__link--active"
            >Statistics</a
          >
          <a href="about.html" class="nav__link">About</a>
        </nav>
      </div>
    </header>
    <main class="main">
      <div class="container">
        <h1 class="stats__title">Overview of your collection</h1>
        <div class="stats-cards">
          <div class="stat-card stat-card--total">
            <p class="stat-card__label">total</p>
            <div class="stat-card__value">
              <span id="totalPlants">0</span>
              <img src="img/tree.svg" alt="tree" class="stat-card__icon" />
            </div>
          </div>
          <div class="stat-card stat-card--watering">
            <p class="stat-card__label">need watering</p>
            <div class="stat-card__value">
              <span id="needWater">0</span>
              <img src="img/drop.svg" alt="drop" class="stat-card__icon" />
            </div>
          </div>
          <div class="stat-card stat-card--healthy">
            <p class="stat-card__label">healthy</p>
            <div class="stat-card__value">
              <span id="healthyPlants">0</span>
              <img src="img/leaf.svg" alt="leaf" class="stat-card__icon" />
            </div>
          </div>
        </div>
        <div class="stats-charts">
          <div class="stats-chart">
            <h2 class="stats-chart__title">Plant types</h2>
            <div class="stats-chart__bars">
              <div class="chart-bar">
                <span class="chart-bar__label">Leafy</span>
                <div class="chart-bar__track">
                  <div
                    class="chart-bar__fill chart-bar__fill--leafy"
                    style="width: 0%"
                    data-value="0"
                  ></div>
                </div>
                <span class="chart-bar__value" id="leafyCount">0</span>
              </div>

              <div class="chart-bar">
                <span class="chart-bar__label">Flowering</span>
                <div class="chart-bar__track">
                  <div
                    class="chart-bar__fill chart-bar__fill--flowering"
                    style="width: 0%"
                    data-value="0"
                  ></div>
                </div>
                <span class="chart-bar__value" id="floweringCount">0</span>
              </div>

              <div class="chart-bar">
                <span class="chart-bar__label">Succulents</span>
                <div class="chart-bar__track">
                  <div
                    class="chart-bar__fill chart-bar__fill--succulent"
                    style="width: 0%"
                    data-value="0"
                  ></div>
                </div>
                <span class="chart-bar__value" id="succulentCount">0</span>
              </div>
            </div>
          </div>
          <div class="stats-chart">
            <h2 class="stats-chart__title">Water needs</h2>
            <div class="stats-chart__bars">
              <div class="chart-bar">
                <span class="chart-bar__label">All good</span>
                <div class="chart-bar__track">
                  <div
                    class="chart-bar__fill chart-bar__fill--good"
                    style="width: 0%"
                    data-value="0"
                  ></div>
                </div>
                <span class="chart-bar__value" id="allGoodCount">0</span>
              </div>
              <div class="chart-bar">
                <span class="chart-bar__label">Attention</span>
                <div class="chart-bar__track">
                  <div
                    class="chart-bar__fill chart-bar__fill--attention"
                    style="width: 0%"
                    data-value="0"
                  ></div>
                </div>
                <span class="chart-bar__value" id="attentionCount">0</span>
              </div>
              <div class="chart-bar">
                <span class="chart-bar__label">Critical</span>
                <div class="chart-bar__track">
                  <div
                    class="chart-bar__fill chart-bar__fill--critical"
                    style="width: 0%"
                    data-value="0"
                  ></div>
                </div>
                <span class="chart-bar__value" id="criticalCount">0</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <footer class="footer">
      <div class="container">
        <p class="footer__text">PlantCare - с заботой о ваших растениях</p>
        <p class="footer__year">2026</p>
      </div>
    </footer>
    <script src="js/app.js"></script>
  </body>
</html>
