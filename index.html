<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PlantCare - Главная</title>
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/index.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <header class="header">
      <div class="header__container container">
        <a href="index.html" class="logo">PlantCare</a>
        <nav class="nav">
          <a href="index.html" class="nav__link nav__link--active">Home</a>
          <a href="stats.html" class="nav__link">Statistics</a>
          <a href="about.html" class="nav__link">About</a>
        </nav>
        <button class="btn btn--add">+ Add Plant</button>
      </div>
    </header>
    <main class="main">
      <div class="controls">
        <input type="text" class="search" placeholder="Название растения..." />
        <div class="controls__actions">
          <div class="dropdown">
            <button class="btn btn--secondary dropdown__trigger" id="filterBtn">
              filter
            </button>
            <div class="dropdown__menu" id="filterMenu">
              <button class="dropdown__item" data-filter="all">
                Все растения
              </button>
              <button class="dropdown__item" data-filter="watering">
                Требуют полива
              </button>
              <button class="dropdown__item" data-filter="healthy">
                Здоровы
              </button>
            </div>
          </div>
        </div>
      </div>
      <div class="plants-grid"></div>
    </main>
    <footer class="footer">
      <div class="container">
        <p class="footer__text">PlantCare - с заботой о ваших растениях</p>
        <p class="footer__year">2026</p>
      </div>
    </footer>
    <script type="module" src="js/app.js"></script>
    <div class="modal" id="addPlantModal">
      <div class="modal__overlay"></div>
      <div class="modal__content">
        <button class="modal__close" id="closeModal">&times;</button>
        <h2 class="modal__title">Форма добавления растения</h2>
        <form class="plant-form" id="plantForm">
          <input
            type="text"
            name="name"
            class="plant-form__input"
            placeholder="Название растения..."
            required
          />
          <input
            type="url"
            name="image"
            class="plant-form__input"
            placeholder="Ссылка на изображение..."
          />
          <label class="plant-form__label">Дата посадки</label>
          <input type="date" name="plantedDate" class="plant-form__input" />
          <select name="type" class="plant-form__select">
            <option value="" disabled selected>Тип...</option>
            <option value="leafy">Leafy</option>
            <option value="flowering">Flowering</option>
            <option value="succulent">Succulent</option>
          </select>
          <label class="plant-form__label"> Дата последнего полива </label>
          <input type="date" name="lastWatered" class="plant-form__input" />
          <input
            type="number"
            name="wateringFrequency"
            class="plant-form__input"
            placeholder="Частота полива (дни)..."
            min="1"
          />
          <textarea
            name="description"
            class="plant-form__textarea"
            placeholder="Описание..."
            rows="4"
          ></textarea>
          <button type="submit" class="btn btn--add plant-form__submit">
            Добавить растение
          </button>
        </form>
      </div>
    </div>
  </body>
</html>
